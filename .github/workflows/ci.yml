name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  internal:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: oxfmt
            command: pnpm format:check
          - name: oxlint
            command: pnpm lint
          - name: typecheck
            command: pnpm typecheck
          - name: tests
            command: pnpm test
          - name: integration
            command: pnpm test:integration
          - name: build
            command: pnpm build
          - name: r2 lifecycle dry-run
            command: pnpm r2:lifecycle:dry-run
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: ${{ matrix.command }}

  without-remote:
    name: without turborepo
    runs-on: ubuntu-latest
    if: github.repository == 'vaishnav-mk/turboflare' && github.event_name != 'pull_request' && vars.TURBOFLARE_REMOTE_API != ''
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: build (no cache)
        run: node scripts/ci/profile-build.mjs --mode no-cache
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: profile-no-cache
          path: ci-results/profile.json

  seed-remote:
    name: with turborepo (seed)
    runs-on: ubuntu-latest
    if: github.repository == 'vaishnav-mk/turboflare' && github.event_name != 'pull_request' && vars.TURBOFLARE_REMOTE_API != ''
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: cold build + upload
        run: node scripts/ci/profile-build.mjs --mode seed
        env:
          TURBO_API: ${{ vars.TURBOFLARE_REMOTE_API }}
          TURBO_TEAM: bench-${{ github.run_id }}
          TURBO_TOKEN: ${{ secrets.TURBOFLARE_REMOTE_TOKEN }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: profile-seed
          path: ci-results/profile.json

  rebuild-remote:
    name: with turborepo (rebuild)
    runs-on: ubuntu-latest
    if: github.repository == 'vaishnav-mk/turboflare' && github.event_name != 'pull_request' && vars.TURBOFLARE_REMOTE_API != ''
    needs: [seed-remote]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: rebuild from remote cache
        run: node scripts/ci/profile-build.mjs --mode rebuild
        env:
          TURBO_API: ${{ vars.TURBOFLARE_REMOTE_API }}
          TURBO_TEAM: bench-${{ github.run_id }}
          TURBO_TOKEN: ${{ secrets.TURBOFLARE_REMOTE_TOKEN }}
          INTERNAL_ADMIN_TOKEN: ${{ secrets.TURBOFLARE_INTERNAL_ADMIN_TOKEN }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: profile-rebuild
          path: ci-results/profile.json

  compare:
    name: compare ci profiles
    runs-on: ubuntu-latest
    if: github.repository == 'vaishnav-mk/turboflare' && github.event_name != 'pull_request' && vars.TURBOFLARE_REMOTE_API != ''
    needs: [without-remote, seed-remote, rebuild-remote]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: profile-no-cache
          path: ci-results/no-cache
      - uses: actions/download-artifact@v7
        with:
          name: profile-seed
          path: ci-results/seed
      - uses: actions/download-artifact@v7
        with:
          name: profile-rebuild
          path: ci-results/rebuild
      - name: compare
        run: node scripts/ci/compare-profiles.mjs
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ci-comparison
          path: ci-results/comparison.md

  dogfood:
    name: dogfood remote cache
    runs-on: ubuntu-latest
    if: github.repository == 'vaishnav-mk/turboflare' && github.event_name != 'pull_request' && vars.TURBOFLARE_REMOTE_API != ''
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/ci/dogfood-remote-cache.mjs
        env:
          INTERNAL_ADMIN_TOKEN: ${{ secrets.TURBOFLARE_INTERNAL_ADMIN_TOKEN }}
          TURBO_API: ${{ vars.TURBOFLARE_REMOTE_API }}
          TURBO_TEAM: dogfood-${{ github.run_id }}
          TURBO_TOKEN: ${{ secrets.TURBOFLARE_REMOTE_TOKEN }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ci-dogfood-remote-cache
          path: ci-results/dogfood-remote-cache

name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

  dogfood:
    name: dogfood remote cache
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: node scripts/ci/dogfood-remote-cache.mjs
        env:
          INTERNAL_ADMIN_TOKEN: ${{ secrets.TURBOFLARE_INTERNAL_ADMIN_TOKEN }}
          TURBO_API: https://turboflare-cache-worker.wishee.workers.dev
          TURBO_TEAM: dogfood-${{ github.run_id }}
          TURBO_TOKEN: ${{ secrets.TURBOFLARE_REMOTE_TOKEN }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ci-dogfood-remote-cache
          path: ci-results/dogfood-remote-cache

name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  with-turborepo:
    name: with turborepo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: node scripts/ci/profile.mjs with-turborepo

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-profile-with-turborepo
          path: ci-results/with-turborepo

  without-turborepo:
    name: without turborepo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: node scripts/ci/profile.mjs without-turborepo

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-profile-without-turborepo
          path: ci-results/without-turborepo

  compare:
    name: compare ci profiles
    runs-on: ubuntu-latest
    needs:
      - with-turborepo
      - without-turborepo
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/download-artifact@v4
        with:
          name: ci-profile-with-turborepo
          path: ci-results/with-turborepo

      - uses: actions/download-artifact@v4
        with:
          name: ci-profile-without-turborepo
          path: ci-results/without-turborepo

      - run: node scripts/ci/compare-profiles.mjs ci-results/with-turborepo/profile.json ci-results/without-turborepo/profile.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-profile-comparison
          path: ci-results/comparison

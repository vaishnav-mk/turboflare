name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  oxfmt:
    name: oxfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm format:check

  oxlint:
    name: oxlint
    runs-on: ubuntu-latest
    needs: [oxfmt]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    needs: [oxlint]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm typecheck

  tests:
    name: tests
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm test

  integration:
    name: integration
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm test:integration

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm build

  r2-lifecycle-dry-run:
    name: r2 lifecycle dry-run
    runs-on: ubuntu-latest
    needs: [tests, integration, build]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm r2:lifecycle:dry-run

  without-remote:
    name: without turborepo
    runs-on: ubuntu-latest
    if: github.repository == 'vaishnav-mk/turboflare' && github.event_name != 'pull_request' && vars.TURBOFLARE_REMOTE_API != ''
    needs: [r2-lifecycle-dry-run]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - name: build (no cache)
        run: node scripts/ci/profile-build.mjs --mode no-cache
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: profile-no-cache
          path: ci-results/profile.json

  seed-remote:
    name: with turborepo (seed)
    runs-on: ubuntu-latest
    if: github.repository == 'vaishnav-mk/turboflare' && github.event_name != 'pull_request' && vars.TURBOFLARE_REMOTE_API != ''
    needs: [r2-lifecycle-dry-run]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - name: cold build + upload
        run: node scripts/ci/profile-build.mjs --mode seed
        env:
          TURBO_API: ${{ vars.TURBOFLARE_REMOTE_API }}
          TURBO_TEAM: bench-${{ github.run_id }}
          TURBO_TOKEN: ${{ secrets.TURBOFLARE_REMOTE_TOKEN }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: profile-seed
          path: ci-results/profile.json

  rebuild-remote:
    name: with turborepo (rebuild)
    runs-on: ubuntu-latest
    if: github.repository == 'vaishnav-mk/turboflare' && github.event_name != 'pull_request' && vars.TURBOFLARE_REMOTE_API != ''
    needs: [seed-remote]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - name: rebuild from remote cache
        run: node scripts/ci/profile-build.mjs --mode rebuild
        env:
          TURBO_API: ${{ vars.TURBOFLARE_REMOTE_API }}
          TURBO_TEAM: bench-${{ github.run_id }}
          TURBO_TOKEN: ${{ secrets.TURBOFLARE_REMOTE_TOKEN }}
          INTERNAL_ADMIN_TOKEN: ${{ secrets.TURBOFLARE_INTERNAL_ADMIN_TOKEN }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: profile-rebuild
          path: ci-results/profile.json

  compare:
    name: compare ci profiles
    runs-on: ubuntu-latest
    if: github.repository == 'vaishnav-mk/turboflare' && github.event_name != 'pull_request' && vars.TURBOFLARE_REMOTE_API != ''
    needs: [without-remote, seed-remote, rebuild-remote]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: profile-no-cache
          path: ci-results/no-cache
      - uses: actions/download-artifact@v7
        with:
          name: profile-seed
          path: ci-results/seed
      - uses: actions/download-artifact@v7
        with:
          name: profile-rebuild
          path: ci-results/rebuild
      - name: compare
        run: node scripts/ci/compare-profiles.mjs
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ci-comparison
          path: ci-results/comparison.md

  dogfood:
    name: dogfood remote cache
    runs-on: ubuntu-latest
    if: github.repository == 'vaishnav-mk/turboflare' && github.event_name != 'pull_request' && vars.TURBOFLARE_REMOTE_API != ''
    needs: [r2-lifecycle-dry-run]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - run: node scripts/ci/dogfood-remote-cache.mjs
        env:
          INTERNAL_ADMIN_TOKEN: ${{ secrets.TURBOFLARE_INTERNAL_ADMIN_TOKEN }}
          TURBO_API: ${{ vars.TURBOFLARE_REMOTE_API }}
          TURBO_TEAM: dogfood-${{ github.run_id }}
          TURBO_TOKEN: ${{ secrets.TURBOFLARE_REMOTE_TOKEN }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ci-dogfood-remote-cache
          path: ci-results/dogfood-remote-cache

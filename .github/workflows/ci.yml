name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  dogfood:
    name: dogfood remote cache
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: node scripts/ci/dogfood-remote-cache.mjs
        env:
          INTERNAL_ADMIN_TOKEN: ${{ secrets.TURBOFLARE_INTERNAL_ADMIN_TOKEN }}
          TURBO_API: https://turboflare-cache-worker.wishee.workers.dev
          TURBO_TEAM: dogfood-${{ github.run_id }}
          TURBO_TOKEN: ${{ secrets.TURBOFLARE_REMOTE_TOKEN }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ci-dogfood-remote-cache
          path: ci-results/dogfood-remote-cache

  with-turborepo:
    name: with turborepo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: node scripts/ci/profile.mjs with-turborepo

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ci-profile-with-turborepo
          path: ci-results/with-turborepo

  without-turborepo:
    name: without turborepo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: node scripts/ci/profile.mjs without-turborepo

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ci-profile-without-turborepo
          path: ci-results/without-turborepo

  compare:
    name: compare ci profiles
    runs-on: ubuntu-latest
    needs:
      - with-turborepo
      - without-turborepo
    if: always()
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: actions/download-artifact@v8
        with:
          name: ci-profile-with-turborepo
          path: ci-results/with-turborepo

      - uses: actions/download-artifact@v8
        with:
          name: ci-profile-without-turborepo
          path: ci-results/without-turborepo

      - run: node scripts/ci/compare-profiles.mjs ci-results/with-turborepo/profile.json ci-results/without-turborepo/profile.json

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ci-profile-comparison
          path: ci-results/comparison

name: cache warm

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  warm:
    name: warm remote cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: node scripts/ci/warm-cache.mjs
        env:
          TURBO_API: https://turboflare-cache-worker.wishee.workers.dev
          TURBO_TEAM: main
          TURBO_TOKEN: ${{ secrets.TURBOFLARE_REMOTE_TOKEN }}
          TURBO_WARM_TASKS: build

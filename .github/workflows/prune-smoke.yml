name: prune smoke

on:
  workflow_dispatch:
    inputs:
      target:
        default: web
        required: true
        type: string

jobs:
  prune-smoke:
    name: prune remote cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: node scripts/ci/prune-smoke.mjs "$TARGET"
        if: vars.TURBOFLARE_REMOTE_API != ''
        env:
          PRUNE_CWD: fixtures/sample-monorepo
          TARGET: ${{ inputs.target }}
          TURBO_API: ${{ vars.TURBOFLARE_REMOTE_API }}
          TURBO_TEAM: prune-${{ github.run_id }}
          TURBO_TOKEN: ${{ secrets.TURBOFLARE_REMOTE_TOKEN }}

name: setup pnpm
description: install pnpm, node, and workspace dependencies
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6
      with:
        version: 11.5.0
    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash

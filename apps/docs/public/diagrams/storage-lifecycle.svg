<svg width="980" height="320" viewBox="0 0 980 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="R2 lifecycle and Worker cleanup">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748B"/></marker>
  </defs>
  <rect width="980" height="320" rx="24" fill="#0F172A"/>
  <g font-family="Inter, ui-sans-serif, system-ui" font-size="16">
    <text x="50" y="48" fill="#E2E8F0" font-size="22" font-weight="800">Retention layers</text>
    <rect x="52" y="84" width="245" height="96" rx="16" fill="#1E293B" stroke="#FBBF24"/>
    <text x="174" y="120" fill="#FEF3C7" text-anchor="middle" font-weight="700">R2 Lifecycle</text>
    <text x="174" y="146" fill="#94A3B8" text-anchor="middle" font-size="13">bucket-managed expiry</text>
    <text x="174" y="166" fill="#94A3B8" text-anchor="middle" font-size="13">delete v1/ after N days</text>

    <rect x="368" y="84" width="245" height="96" rx="16" fill="#1E293B" stroke="#22C55E"/>
    <text x="490" y="120" fill="#DCFCE7" text-anchor="middle" font-weight="700">Worker Cron</text>
    <text x="490" y="146" fill="#94A3B8" text-anchor="middle" font-size="13">bounded cleanup</text>
    <text x="490" y="166" fill="#94A3B8" text-anchor="middle" font-size="13">KV / D1 index / branch TTL</text>

    <rect x="684" y="84" width="245" height="96" rx="16" fill="#1E293B" stroke="#38BDF8"/>
    <text x="806" y="120" fill="#E0F2FE" text-anchor="middle" font-weight="700">Artifact Store</text>
    <text x="806" y="146" fill="#94A3B8" text-anchor="middle" font-size="13">R2 default</text>
    <text x="806" y="166" fill="#94A3B8" text-anchor="middle" font-size="13">KV explicit fallback</text>

    <path d="M298 132 H364" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M614 132 H680" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="52" y="226" width="877" height="52" rx="14" fill="#111827" stroke="#334155"/>
    <text x="490" y="258" fill="#CBD5E1" text-anchor="middle" font-size="15">Simple R2-only setup: R2 lifecycle is primary. Keep Worker cron for advanced cleanup and as a bounded backup.</text>
  </g>
</svg>

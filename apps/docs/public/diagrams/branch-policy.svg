<svg width="980" height="330" viewBox="0 0 980 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Branch cache policy diagram">
  <rect width="980" height="330" rx="24" fill="#0F172A"/>
  <g font-family="Inter, ui-sans-serif, system-ui" font-size="15">
    <text x="50" y="45" fill="#E2E8F0" font-size="22" font-weight="800">Branch cache policies</text>
    <rect x="54" y="80" width="200" height="178" rx="16" fill="#1E293B" stroke="#38BDF8"/>
    <text x="154" y="115" fill="#E0F2FE" text-anchor="middle" font-weight="700">shared</text>
    <text x="154" y="150" fill="#CBD5E1" text-anchor="middle">main</text>
    <text x="154" y="178" fill="#CBD5E1" text-anchor="middle">feature</text>
    <text x="154" y="220" fill="#94A3B8" text-anchor="middle" font-size="13">same artifact key</text>

    <rect x="282" y="80" width="200" height="178" rx="16" fill="#1E293B" stroke="#22C55E"/>
    <text x="382" y="115" fill="#DCFCE7" text-anchor="middle" font-weight="700">isolated</text>
    <text x="382" y="150" fill="#CBD5E1" text-anchor="middle">main -> main key</text>
    <text x="382" y="178" fill="#CBD5E1" text-anchor="middle">feature -> branch key</text>
    <text x="382" y="220" fill="#94A3B8" text-anchor="middle" font-size="13">no fallback</text>

    <rect x="510" y="80" width="200" height="178" rx="16" fill="#1E293B" stroke="#FBBF24"/>
    <text x="610" y="115" fill="#FEF3C7" text-anchor="middle" font-weight="700">main-write-pr-read</text>
    <text x="610" y="150" fill="#CBD5E1" text-anchor="middle">PR writes branch</text>
    <text x="610" y="178" fill="#CBD5E1" text-anchor="middle">PR reads branch</text>
    <text x="610" y="206" fill="#CBD5E1" text-anchor="middle">then main fallback</text>

    <rect x="738" y="80" width="200" height="178" rx="16" fill="#1E293B" stroke="#F87171"/>
    <text x="838" y="115" fill="#FEE2E2" text-anchor="middle" font-weight="700">read-only-pr</text>
    <text x="838" y="150" fill="#CBD5E1" text-anchor="middle">PR reads main</text>
    <text x="838" y="178" fill="#CBD5E1" text-anchor="middle">PR writes rejected</text>
    <text x="838" y="220" fill="#94A3B8" text-anchor="middle" font-size="13">safe untrusted PRs</text>
  </g>
</svg>
